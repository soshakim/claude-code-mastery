<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="할 일 관리 앱 - 우선순위와 필터링을 지원하는 TODO 앱">
  <meta property="og:title" content="TODO 앱">
  <meta property="og:description" content="효율적인 할 일 관리를 위한 간단한 TODO 앱">
  <meta property="og:type" content="website">

  <title>TODO 앱</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- 커스텀 CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Tailwind 커스텀 설정 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0f172a',
            'navy-light': '#0d1526',
            accent: '#3b82f6',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#0f172a] text-white font-sans">

  <!-- =============== HEADER =============== -->
  <header id="header" class="fixed top-0 w-full z-50 transition-all duration-300">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <!-- 로고 -->
      <a href="index.html" class="text-xl font-bold text-white hover:text-[#3b82f6] transition-colors">
        TODO<span class="text-[#3b82f6]">.</span>
      </a>

      <!-- 네비게이션 -->
      <nav class="flex gap-4">
        <a href="index.html" class="nav-link">← 이력서로</a>
      </nav>
    </div>
  </header>

  <!-- =============== MAIN =============== -->
  <main class="min-h-screen pt-24 pb-16 bg-[#0f172a]">
    <div class="max-w-2xl mx-auto px-4">

      <!-- 제목 영역 -->
      <div class="mb-12">
        <h1 class="text-5xl md:text-6xl font-bold mb-2 text-white">할 일 목록</h1>
        <p class="text-gray-400 text-lg">오늘의 목표를 정하고 체크해봅시다</p>
      </div>

      <!-- 입력 영역 -->
      <div id="inputArea" class="mb-8 p-6 bg-[#1e293b] rounded-lg border border-[#334155]">
        <div class="flex gap-3 flex-col sm:flex-row">
          <input
            id="todoInput"
            type="text"
            placeholder="새 할 일 입력..."
            class="flex-1 px-4 py-3 bg-[#0f172a] text-white border border-[#334155] rounded focus:outline-none focus:border-[#3b82f6] focus:ring-1 focus:ring-[#3b82f6]"
            autocomplete="off"
          />
          <select
            id="prioritySelect"
            class="px-4 py-3 bg-[#0f172a] text-white border border-[#334155] rounded focus:outline-none focus:border-[#3b82f6]"
          >
            <option value="normal">보통</option>
            <option value="high">높음</option>
            <option value="low">낮음</option>
          </select>
          <button
            id="addBtn"
            class="btn-primary px-6 py-3 rounded whitespace-nowrap"
          >
            추가
          </button>
        </div>
      </div>

      <!-- 필터 탭 -->
      <div id="filterTabs" class="mb-6 flex gap-3 border-b border-[#334155] pb-4">
        <button
          class="filter-tab active px-4 py-2 text-white border-b-2 border-[#3b82f6] font-medium transition-colors"
          data-filter="all"
        >
          전체
        </button>
        <button
          class="filter-tab px-4 py-2 text-gray-400 border-b-2 border-transparent hover:text-white transition-colors"
          data-filter="active"
        >
          진행 중
        </button>
        <button
          class="filter-tab px-4 py-2 text-gray-400 border-b-2 border-transparent hover:text-white transition-colors"
          data-filter="completed"
        >
          완료
        </button>
      </div>

      <!-- 통계 바 -->
      <div id="statsBar" class="mb-6 flex items-center justify-between py-3 px-4 bg-[#1e293b] rounded-lg">
        <span id="todosCount" class="text-gray-400">
          <span id="activeCount">0</span>개 진행 중
        </span>
        <button
          id="clearCompletedBtn"
          class="text-sm text-gray-400 hover:text-red-400 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          disabled
        >
          완료된 항목 삭제
        </button>
      </div>

      <!-- 할일 목록 -->
      <ul id="todoList" class="space-y-2 mb-8">
        <!-- 동적으로 렌더링됨 -->
      </ul>

      <!-- 빈 상태 메시지 -->
      <div
        id="emptyState"
        class="text-center py-12 text-gray-500"
        style="display: none;"
      >
        <p class="text-xl mb-2">할 일이 없습니다 🎉</p>
        <p class="text-sm">새로운 할 일을 추가해봅시다</p>
      </div>

    </div>
  </main>

  <!-- JavaScript -->
  <script src="js/todo.js"></script>

</body>
</html>
